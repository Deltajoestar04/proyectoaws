<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Usuario</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }

    h1 {
      color: #333;
    }

    .form-container {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 300px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <h1>Agregar Nuevo Usuario</h1>
  <div class="form-container">
    <label for="username">Nombre de Usuario:</label>
    <input type="text" id="username" placeholder="Ingrese nombre" required>

    <label for="telefono">Teléfono:</label>
    <input type="text" id="telefono" placeholder="Ingrese teléfono" required>

    <label for="puesto">Puesto:</label>
    <input type="text" id="puesto" placeholder="Ingrese puesto" required>

    <button id="saveButton">Guardar</button>
  </div>

  <script src="control/nuevor.js"></script>
</body>
</html>
