<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }

    /* Estilo del encabezado */
    h1, h2 {
      color: #333;
    }

    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.5em;
      color: #4CAF50;
      margin-bottom: 20px;
    }

    /* Barra de búsqueda */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-bar input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      width: 250px;
    }

    .search-bar button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .search-bar button:hover {
      background-color: #45a049;
    }

    /* Estilo de la tabla */
    table {
      width: 80%;
      margin-top: 20px;
      border-collapse: collapse;
      background-color: white;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    table th, table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    table th {
      background-color: #4CAF50;
      color: white;
      text-align: center;
    }

    table tr:hover {
      background-color: #f5f5f5;
    }

    table td {
      text-align: center;
    }
  
  button {
    padding: 5px 10px;
    background-color: #f44336;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  
  button:hover {
    background-color: #e53935;
  }
</style>
</head>
<body>
</head>
<body>
  <h1>Data base</h1>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar usuario...">
    <button id="searchButton">Buscar</button>
  </div>

  <h2>Lista de Usuarios</h2>
  <table class="table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Puesto</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      <!-- Filas de usuarios generadas aquí -->
    </tbody>
  </table>
  <button class="new-user-button" id="newUserButton">Nuevo Usuario</button>

  <script type="module">
    // Redirigir a la pantalla de agregar usuario
    document.getElementById('newUserButton').addEventListener('click', function () {
      window.location.href = 'nuevor.html';
    });
  </script>
  <script type="module" src="control/script.js"></script>
</body>
</html>
