<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
        }
        .login-container {
            width: 300px;
            padding: 30px;
            background-color: #a3a3a3;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .login-container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 20px auto;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://cdn-icons-png.freepik.com/512/17740/17740838.png" alt="User Avatar">
        <h2>Inicio de Sesión</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" placeholder="user" required>
            </div>
            <div class="form-group">
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" name="contrasena" placeholder="password" required>
            </div>
            
            <button type="submit" class="btn">Iniciar</button>
        </form>
        <div class="error" id="message"></div>
    </div>

    <script>
        const usuarioValido = "Juan";
        const contrasenaValida = "12345";

        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Evita la recarga de la página
            const usuario = document.getElementById("usuario").value;
            const contrasena = document.getElementById("contrasena").value;
            const mensaje = document.getElementById("message");

            if (usuario === usuarioValido && contrasena === contrasenaValida) {
                mensaje.style.color = "green";
                mensaje.textContent = "Inicio de sesión exitoso.";
                window.location.href = "pantallas/pantalla.html";

                setTimeout(() => {
                    window.close(); 
                }, 500);
            } else {
                mensaje.textContent = "Usuario y/o contraseña son incorrectos";
            }
        });
    </script>

</html>
